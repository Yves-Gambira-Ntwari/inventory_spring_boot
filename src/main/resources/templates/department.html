<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Department Form</title>
</head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
	nav{
		background: white;
		position: fixed;
		top: 0;
		bottom: 0;
		left: 0;
		width: 10rem;
	}
	
	nav a i {
    margin-right: 10px;
}
	
	nav{
		display: flex;
		flex-direction: column;
		gap: 10rem;
		padding-left: 20px;
		
		
	}
	
	.navs{
		display: flex;
		flex-direction: column;
		gap: 1rem;
		
	}
	
	.navs h1{
		color:#36396e;
	}
	
	nav a{
		display: flex;
		color: #a8abba;
		text-decoration: none;
		transition: 300ms;
	}
	
	nav a.active{
		color:#36396e;
	}
	
	nav a:hover{
		color:#36396e;
	}
	
	main{
		margin-left: 12rem;
	}

.form{
	display: flex;
	width: 80%;
	height: 80vh;
}

h2{
	font-weight: bold;
	text-align: center;
}

.form form{
	display: flex;
	flex-direction: column;
	width: 90%;
	gap: 2rem;
}

.form input{
	border: 1px solid rgb(192, 192, 192);
}

.form input,button{
	width: 90%;
	padding: 10px;
	outline: none;
}

.form select{
	border: 1px solid rgb(192, 192, 192);
	padding: 10px;
	width: 93%;
}

.form a{
	color: white;
	text-decoration: none;
	background-color: #11a676;
	padding: 5px 4rem;
	border-radius: 10px;
}

.form button{
	background: #11a676;
	color: white;
	border: none;
	border-radius: 10px;
	cursor: pointer;
}
</style>

<body>

<nav>
	<div class="navs">	
	<div>
		<h1><span>Inventory</span></h1>
	</div>		
	<div>			
        <a href="/dashboard"><i class="fa-solid fa-gauge"></i> <span>Dashboard</span></a> 
	</div>

	<div>			
        <a href="/employee"><i class="fa-solid fa-users"></i> <span>Employees</span></a> 
	</div>

	<div>			
        <a href="/devices"><i class="fa-solid fa-laptop"></i> <span>Devices</span></a> 
	</div>

	<div>			
        <a href="/department" class="active"><i class="fa-solid fa-building"></i> <span>Departments</span></a> 
	</div>

	<div>			
        <a href="/assegnment"><i class="fa-solid fa-clipboard-list"></i> <span>Assignment</span></a> 
	</div>

	<div>			
        <a href="/history"><i class="fa-solid fa-clock-rotate-left"></i> <span>History</span></a>
	</div>
</div>

<div class="logout">	
	<div>			
		<a href="/logout"><i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span></a>
	</div>		
</div>
</nav>

    <h2>Add Department</h2>

    <main class="form">
        <form th:action="@{/department/save}" method="post" th:object="${department}">
            
            <input type="hidden" th:field="*{id}">

            <div>
                <label for="name">Department Name:</label>
                <input type="text" id="name" th:field="*{name}" required />
            </div>

            <div>
                <label for="location">Location:</label> <br>
                <input type="text" id="location" th:field="*{location}" required />
            </div>

            <button type="submit">Save Department</button>

        </form>
    </main>

</body>
</html>
